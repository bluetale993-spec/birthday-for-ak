<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday AK ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#6a11cb,#2575fc);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
text-align:center;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

.box{
background:rgba(255,255,255,.12);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
max-width:600px;
}

#gift{
font-size:90px;
cursor:pointer;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
50%{transform:translateY(-12px);}
}

.hidden{
display:none;
}

h1{
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 8px white;}
to{text-shadow:0 0 25px pink;}
}

.balloon{
position:absolute;
bottom:-80px;
font-size:35px;
animation:up 8s linear infinite;
}

@keyframes up{
to{
transform:translateY(-120vh);
}
}

.heart{
position:absolute;
font-size:22px;
animation:heart 5s linear infinite;
}

@keyframes heart{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}

button{
margin-top:20px;
padding:12px 24px;
border:none;
border-radius:30px;
cursor:pointer;
font-size:16px;
background:white;
color:#6a11cb;
}
</style>

</head>

<body>

<div class="box">

<div id="start">
<h2>A little surprise for...</h2>
<h1>AK ❤️</h1>
<p>Click the gift!</p>
<div id="gift">🎁</div>
</div>

<div id="msg" class="hidden">
<h1>🎉 Happy Birthday AK! 🎂</h1>

<p id="type"></p>

<button onclick="finalMsg()">One Last Surprise ❤️</button>

</div>

</div>

<script>

for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDelay=Math.random()*2+"s";
document.body.appendChild(s);
}

const message=`Today is all about celebrating YOU.

I wanted to make something instead of sending just a normal birthday message.

Thank you for being such an amazing person.

I hope this year brings you happiness, success, peace and countless smiles.

Keep shining.

Happy Birthday once again, AK! ❤️`;

document.getElementById("gift").onclick=function(){

document.getElementById("start").classList.add("hidden");
document.getElementById("msg").classList.remove("hidden");

let i=0;

function typing(){
if(i<message.length){
document.getElementById("type").innerHTML+=message.charAt(i);
i++;
setTimeout(typing,35);
}
}

typing();

for(let i=0;i<25;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML=Math.random()>0.5?"🎈":"🎉";
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(b);
}

}

function finalMsg(){

alert("💖 The best gifts aren't always things...\nSometimes they're people.\n\nHappy Birthday, AK! 🎂❤️");

for(let i=0;i<60;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(h);

}

}

</script>

</body>
</html>
