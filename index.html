<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(135deg,#ffd6e8,#ffeef5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#giftPage{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.gift{
font-size:130px;
cursor:pointer;
transition:.6s;
animation:float 2s infinite ease-in-out;
}

.gift:hover{
transform:scale(1.1);
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.tap{
margin-top:20px;
font-size:22px;
color:#ff4081;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:.3;}
}

#main{
display:none;
width:100%;
height:100%;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(to bottom,#fff0f6,#ffe6ef);
animation:fade 1.5s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

h1{
font-size:42px;
color:#ff4081;
}

p{
margin-top:20px;
font-size:22px;
color:#444;
}

.heart{
position:absolute;
font-size:25px;
animation:rise linear infinite;
}

@keyframes rise{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<div id="giftPage">
<div class="gift" onclick="openGift()">🎁</div>
<div class="tap">Tap the Gift ❤️</div>
</div>

<div id="main">
<h1>Happy Birthday ❤️</h1>
<p>Your surprise begins...</p>
</div>

<script>
function openGift(){

document.querySelector(".gift").innerHTML="🎉";

confetti();

setTimeout(()=>{
document.getElementById("giftPage").style.display="none";
document.getElementById("main").style.display="flex";
},1000);

}


function hearts(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>0.5?"💖":"💕";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),8000);

}
function confetti(){

for(let i=0;i<150;i++){

const c=document.createElement("div");

c.innerHTML=["🎊","🎉","✨","💖"][Math.floor(Math.random()*4)];

c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-20px";
c.style.fontSize=(15+Math.random()*20)+"px";
c.style.transition="all 4s ease-in";
document.body.appendChild(c);

setTimeout(()=>{
c.style.transform=`translate(${Math.random()*600-300}px, 110vh) rotate(${Math.random()*1080}deg)`;
},10);

setTimeout(()=>{
c.remove();
},3000);

}

}
setInterval(hearts,300);

</script>

</body>
</html>
